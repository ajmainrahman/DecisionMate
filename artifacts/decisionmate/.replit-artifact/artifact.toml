kind = "web"
previewPath = "/"
title = "Thinkora"
version = "1.0.0"
id = "artifacts/decisionmate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18160

[services.development]
run = "pnpm --filter @workspace/decisionmate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/decisionmate", "run", "build" ]
publicDir = "artifacts/decisionmate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18160"
API_PORT = "8080"
BASE_PATH = "/"
